name: Build EXE

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || github.event.workflow_run.head_sha }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build one-file exe
        run: uv run pyinstaller --onefile --name QQMusic2BiliFav main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: QQMusic2BiliFav-exe
          path: dist/QQMusic2BiliFav.exe
          if-no-files-found: error
