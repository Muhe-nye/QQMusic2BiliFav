name: Build EXE

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  BUILD_SHA: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}

permissions:
  contents: write

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || github.event.workflow_run.head_sha }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build one-file exe
        run: uv run pyinstaller --onefile --name QQMusic2BiliFav main.py

      - name: Ensure release exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view latest-exe --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create latest-exe --repo $env:GITHUB_REPOSITORY --title "Latest EXE Build" --notes "Auto-generated build release."
          }

      - name: Upload EXE to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload latest-exe dist/QQMusic2BiliFav.exe --repo $env:GITHUB_REPOSITORY --clobber
          gh release edit latest-exe --repo $env:GITHUB_REPOSITORY --title "Latest EXE Build" --notes "Built from commit $env:BUILD_SHA"

      - name: Upload artifact (zip backup)
        uses: actions/upload-artifact@v4
        with:
          name: QQMusic2BiliFav-exe
          path: dist/QQMusic2BiliFav.exe
          if-no-files-found: error
